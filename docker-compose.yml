services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: phosphor
      POSTGRES_PASSWORD: phosphor
      POSTGRES_DB: phosphor
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phosphor"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg-data:
