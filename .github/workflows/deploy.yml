name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/phosphor-relay

jobs:
  # ── Build relay Docker image, push to GHCR ──
  # The VM at shell.betaporter.dev pulls and runs it (see deploy/vm/README.md).
  build-push:
    name: Build & Push Relay Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" -f deploy/Dockerfile .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  # ── Build CLI for all platforms, create GitHub Release ──
  release:
    name: Build CLI & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI binaries
        run: |
          mkdir -p dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/phosphor-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="-s -w" -o "$output" ./cmd/phosphor
          done

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            const merged = prs.find(p => p.merged_at !== null);
            if (merged) {
              fs.writeFileSync('release-notes.md', merged.body || 'No description provided.');
              core.setOutput('title', merged.title);
            } else {
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha
              });
              const summary = commit.commit.message.split('\n')[0];
              fs.writeFileSync('release-notes.md', summary);
              core.setOutput('title', summary);
            }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "v1.0.${{ github.run_number }} - ${{ steps.notes.outputs.title }}"
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: false
