services:
  relay:
    image: ghcr.io/brporter/phosphor-relay:latest
    restart: unless-stopped
    env_file: .env
    environment:
      ADDR: ":8080"
      BASE_URL: "https://phosphor.betaporter.dev"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      default: {}
      web:
        aliases: [phosphor-relay]
    # Uncomment to enable the API-key revocation blocklist:
    # volumes:
    #   - ./revoked-keys.txt:/etc/phosphor/revoked-keys.txt:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

networks:
  web:
    external: true

volumes:
  redis-data:
