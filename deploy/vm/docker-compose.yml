services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  relay:
    image: ghcr.io/brporter/phosphor-relay:latest
    restart: unless-stopped
    env_file: .env
    environment:
      ADDR: ":8080"
      BASE_URL: "https://phosphor.betaporter.dev"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    # Uncomment to enable the API-key revocation blocklist:
    # volumes:
    #   - ./revoked-keys.txt:/etc/phosphor/revoked-keys.txt:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    command: --label-enable --interval 300 --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy-data:
  caddy-config:
  redis-data:
